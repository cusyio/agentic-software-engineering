# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

ci:
  autoupdate_schedule: monthly

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
    - id: check-json
      types: [file]  # override `types: [json]`
      files: \.(json|ipynb)$
    - id: check-toml
    - id: check-yaml
      types: [file]
      files: \.(yml|yaml|cff)$
    - id: check-added-large-files
    - id: end-of-file-fixer
    - id: trailing-whitespace
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: f073523dfd27b01ec7997cc970a2a7b36c303460 # v2.25.0
    hooks:
    - id: pyproject-fmt
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: 4b2e70d08cb2ccd26d1fba73588de41c7a5d50b7 # v0.25
    hooks:
    - id: validate-pyproject
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 77039ccbba72c8aede339c5f8ae29b42aced0a2e # v0.15.18
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/sphinx-contrib/sphinx-lint
    rev: c883505f64b59c3c5c9375191e4ad9f98e727ccd # v1.0.2
    hooks:
    - id: sphinx-lint
      types: [rst]
  - repo: https://github.com/adamchainz/blacken-docs
    rev: fda77690955e9b63c6687d8806bafd56a526e45f # 1.20.0
    hooks:
    - id: blacken-docs
      args: [--line-length=79]
      additional_dependencies:
      - black
  - repo: https://github.com/fsfe/reuse-tool
    rev: a1bb792acda6fd0724936b4ebbdbc8eceb9c0459 # v6.2.0
    hooks:
    - id: reuse
      args: ["lint"]
